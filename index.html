<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>得物订单汇总</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #1890ff; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .upload-area { background: white; padding: 40px; border-radius: 8px; text-align: center; border: 2px dashed #ddd; cursor: pointer; margin-bottom: 20px; transition: border-color 0.3s; }
        .upload-area:hover { border-color: #1890ff; }
        .upload-area input { display: none; }
        .config-bar { display: flex; justify-content: center; gap: 20px; align-items: center; margin-bottom: 15px; }
        .config-bar label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab.active { background: #1890ff; color: white; }
        .tab:hover:not(.active) { background: #e6f7ff; }
        .panel { background: white; padding: 20px; border-radius: 8px; display: none; }
        .panel.active { display: block; }
        .stats-toolbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .stats-summary { display: flex; gap: 20px; margin-bottom: 15px; font-size: 13px; justify-content: center; }
        .stat-item { display: flex; gap: 5px; align-items: baseline; }
        .stat-item .label { color: #666; }
        .stat-item .value { font-weight: bold; color: #1890ff; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8f9fa; }
        .order-group { margin-bottom: 20px; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
        .orders-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 12px; }
        .order-card { border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
        .order-card-header { background: #f0f5ff; padding: 5px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8e8; }
        .order-card-header.full { background: #ccc; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .card-header-right { display: flex; align-items: center; gap: 10px; }
        .order-count { color: #666; font-size: 13px; }
        .print-header { display: none; }
        .express-input { border: 1px solid #ddd; background: transparent; outline: none; }
        .express-input:focus { border-color: #1890ff; }
        @page { margin: 8mm 10mm 10mm 10mm; size: A4; }
        @media print {
            html, body { width: 210mm; }
            body { background: white; padding: 0; margin: 0; }
            .container { max-width: 100%; padding: 0; }
            .header, .upload-area, .tabs, .config-bar, .pagination { display: none !important; }
            .print-header { display: flex !important; justify-content: space-between; padding: 0 0 8px 0; font-size: 14px; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 8px; }
            #ordersPanel { padding: 0; }
            #ordersContainer { padding: 0; }
            .orders-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 6mm; }
            .order-card { break-inside: avoid; border: 1px solid #333; page-break-inside: avoid; margin-bottom: 0; }
            .order-table { table-layout: fixed; margin-top: 0; }
            .order-card-header:not(.full) { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 3px 5px; font-size: 10px; }
            .order-card-header.full { -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 3px 5px; font-size: 10px; }
            .order-table th { background: #f5f5f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 2px 3px; line-height: 1.1; font-size: 9px; }
            .order-table td { padding: 2px 3px; font-size: 9px; line-height: 1.1; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .order-table tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .summary-table { max-height: none !important; overflow: visible !important; }
            .summary-table table { font-size: 10px; }
            .summary-table th, .summary-table td { padding: 3px 5px; }
            .copy-btn, .icon-btn-small, .pagination, .orders-toolbar, .stats-toolbar, .config-bar { display: none !important; }
            .panel:not(.active) { display: none !important; }
            .express-input::placeholder { color: transparent; }
        }
        .order-group-header { background: #f0f5ff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8e8e8; }
        .order-group-header .address { font-weight: 600; color: #333; flex: 1; }
        .order-group-header .time { color: #666; font-size: 13px; margin-right: 15px; }
        .copy-btn { background: #1890ff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .copy-btn:hover { background: #40a9ff; }
        .copy-btn.copied { background: #52c41a; }
            .order-table { width: 100%; table-layout: fixed; margin-top: 0; }
        .order-table th { background: #fafafa; font-size: 13px; padding: 4px; }
        .order-table td { font-size: 13px; padding: 5px 12px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; }
        .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { border-color: #1890ff; color: #1890ff; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { color: #666; }
        .no-data { text-align: center; padding: 60px; color: #999; }
        .summary-table { max-height: 500px; overflow-y: auto; }
        .rawdata-table { max-height: calc(100vh - 200px); overflow: auto; }
        .raw-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .raw-table th, .raw-table td { padding: 6px 8px; border: 1px solid #ddd; text-align: left; }
        .raw-table th { background: #f5f5f5; position: sticky; top: 0; }
        .raw-table tr:hover { background: #f9f9f9; }
        .raw-table tr.warning-row { background: #ffcccc; }
        .export-btn { background: #52c41a; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        .export-btn:hover { background: #73d13d; }
        .icon-btn { background: none; border: 1px solid #ddd; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 18px; margin-left: 5px; }
        .icon-btn:hover { border-color: #1890ff; }
        .icon-btn-small { background: none; border: none; padding: 2px 4px; cursor: pointer; font-size: 14px; }
        .icon-btn-small:hover { opacity: 0.7; }
        .orders-toolbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .header-actions { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .express-input { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; width: 160px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>得物订单数据汇总</h1>
            <p>支持 Excel 文件导入，自动分析订单数据</p>
        </div>
        
        <div class="config-bar">
            <label><input type="checkbox" id="configShowNo"> 显示单号</label>
            <label><input type="checkbox" id="configMergeSku"> 相同货号合并</label>
            <label>每组数量: <input type="number" id="configMaxGroup" min="0" max="100" style="width: 50px;" placeholder="0为不限制"></label>
            <label>排序: <select id="configSortOrder"><option value="addr-time-sku">地址→时间→SKU</option><option value="addr-sku-time">地址→SKU→时间</option><option value="addr-no-sku">地址→单号→SKU</option></select></label>
        </div>
        <div class="upload-area" id="uploadArea">
            <p>点击下方按钮选择 Excel 文件</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:block; margin: 15px auto;">
            <p style="color: #999; font-size: 12px;">支持 .xlsx, .xls 格式</p>
        </div>
        
        <div class="tabs" id="tabs" style="display: none;">
            <button class="tab active" data-tab="summary">货号规格统计</button>
            <button class="tab" data-tab="orders">订单列表</button>
            <button class="tab" data-tab="rawdata">原始数据</button>
        </div>
        
        <div class="panel active" id="summaryPanel">
            <div class="stats-toolbar">
                <button class="icon-btn" onclick="window.print()" title="打印">🖨️</button>
                <button class="icon-btn" onclick="exportSummary()" title="导出">📥</button>
                <button class="icon-btn" onclick="copySummary()" title="复制">📋</button>
            </div>
            <div class="stats-summary" id="statsSummary"></div>
            <div class="summary-table">
                <table id="summaryTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>货号</th>
                            <th>规格</th>
                            <th>总数量</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>
        
        <div class="panel" id="ordersPanel">
            <div class="print-header" id="printHeader"></div>
            <div class="orders-toolbar" id="ordersActions" style="display: none;">
                <button class="icon-btn" onclick="window.print()" title="打印">🖨️</button>
                <button class="icon-btn" onclick="exportOrders()" title="导出">📥</button>
            </div>
            <div id="ordersContainer"></div>
            <div class="pagination" id="pagination"></div>
        </div>
        
        <div class="panel" id="rawdataPanel">
            <div class="rawdata-table" id="rawdataContainer"></div>
        </div>
    </div>
    
    <script>
        let orderData = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        const groupSize = 8;
        
        let config = { showNo: false, mergeSku: false, maxPerGroup: 8, sortOrder: 'addr-time-sku' };
        
        function loadConfig() {
            const saved = localStorage.getItem('dwzxConfig');
            if (saved) {
                const savedConfig = JSON.parse(saved);
                config = { ...config, ...savedConfig };
            }
            document.getElementById('configShowNo').checked = config.showNo;
            document.getElementById('configMergeSku').checked = config.mergeSku;
            document.getElementById('configMaxGroup').value = config.maxPerGroup;
            document.getElementById('configSortOrder').value = config.sortOrder;
            
            document.getElementById('configShowNo').addEventListener('change', updateConfig);
            document.getElementById('configMergeSku').addEventListener('change', updateConfig);
            document.getElementById('configMaxGroup').addEventListener('change', updateConfig);
            document.getElementById('configSortOrder').addEventListener('change', updateConfig);
        }
        
        function updateConfig() {
            config.showNo = document.getElementById('configShowNo').checked;
            config.mergeSku = document.getElementById('configMergeSku').checked;
            config.maxPerGroup = parseInt(document.getElementById('configMaxGroup').value) || 0;
            config.sortOrder = document.getElementById('configSortOrder').value;
            localStorage.setItem('dwzxConfig', JSON.stringify(config));
            if (orderData.length > 0) {
                processData();
            }
        }
        
        loadConfig();
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', (e) => { 
            if (e.target !== fileInput) fileInput.click(); 
        });
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#1890ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#ddd'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ddd';
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchToTab(tab.dataset.tab);
            });
        });
        
        function switchToTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName + 'Panel').classList.add('active');
        }
        
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    orderData = XLSX.utils.sheet_to_json(worksheet);
                    orderData = orderData.filter(row => (row['订单类型'] || '') !== '品牌直发');
                    console.log('过滤后数据行数:', orderData.length);
                    
                    if (orderData.length > 0) {
                        const nonNormalOrders = [];
                        orderData.forEach((row, idx) => {
                            const orderType = row['订单类型'] || '';
                            if (orderType !== '普通现货') {
                                nonNormalOrders.push({ index: idx + 1, orderType });
                            }
                        });
                        
                        if (nonNormalOrders.length > 0) {
                            const msg = nonNormalOrders.map(n => `第${n.index}行: ${n.orderType}`).join('\n');
                            setTimeout(() => {
                                alert('以下订单类型不是"普通现货":\n' + msg);
                                switchToTab('rawdata');
                            }, 100);
                        }
                    }
                    
                    if (orderData.length > 0) {
                        document.getElementById('tabs').style.display = 'flex';
                        processData();
                    } else {
                        alert('未读取到数据，请检查Excel文件格式');
                    }
                } catch (err) {
                    console.error('读取错误:', err);
                    alert('读取文件失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function processData() {
            renderSummary();
            renderOrders();
            renderRawData();
        }
        
        function renderRawData() {
            if (orderData.length === 0) {
                document.getElementById('rawdataContainer').innerHTML = '<div class="no-data">暂无数据</div>';
                return;
            }
            const columns = ['订单号', '订单类型', 'spuID', 'skuID', '货号', '规格', '数量', '品牌', '出价金额（元）', '预计收入金额（元）', '剩余发货时效', '订单状态', '得物收货地址', '买家下单时间', '买家支付时间'];
            let html = '<table class="raw-table"><thead><tr>';
            columns.forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr></thead><tbody>';
            orderData.forEach(row => {
                const orderType = row['订单类型'] || '';
                const rowClass = orderType !== '普通现货' ? 'warning-row' : '';
                html += `<tr class="${rowClass}">`;
                columns.forEach(key => {
                    html += `<td>${row[key] || ''}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('rawdataContainer').innerHTML = html;
        }
        
        function renderSummary() {
            const stats = {};
            orderData.forEach(row => {
                const 货号 = row['货号'] || '';
                const 规格 = row['规格'] || '';
                const 数量 = parseInt(row['数量']) || 0;
                const orderType = row['订单类型'] || '';
                const isNormal = orderType === '普通现货';
                const key = `${货号}|${规格}`;
                if (!stats[key]) stats[key] = { 货号, 规格, 现货: 0, 非现货: 0 };
                if (isNormal) {
                    stats[key].现货 += 数量;
                } else {
                    stats[key].非现货 += 数量;
                }
            });
            
            const list = Object.values(stats).sort((a, b) => a.货号.localeCompare(b.货号));
            const totalOrders = orderData.length;
            const totalQuantity = list.reduce((sum, item) => sum + item.现货 + item.非现货, 0);
            const uniqueTypes = list.length;
            
            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-item"><span class="label">订单总数:</span><span class="value">${totalOrders}</span></div>
                <div class="stat-item"><span class="label">商品总数量:</span><span class="value">${totalQuantity}</span></div>
                <div class="stat-item"><span class="label">货号规格种类:</span><span class="value">${uniqueTypes}</span></div>
            `;
            
            document.getElementById('summaryBody').innerHTML = list.map((item, i) => {
                const total = item.现货 + item.非现货;
                const quantityDisplay = item.非现货 > 0 ? `${item.现货}+${item.非现货}=${total}` : `${total}`;
                const rowClass = item.非现货 > 0 ? 'class="warning-row"' : '';
                return `
                    <tr ${rowClass}>
                        <td>${i + 1}</td>
                        <td>${item.货号}</td>
                        <td>${item.规格}</td>
                        <td>${quantityDisplay}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function copySummary() {
            const stats = {};
            orderData.forEach(row => {
                const 货号 = row['货号'] || '';
                const 规格 = row['规格'] || '';
                const 数量 = parseInt(row['数量']) || 0;
                const orderType = row['订单类型'] || '';
                const isNormal = orderType === '普通现货';
                const key = `${货号}|${规格}`;
                if (!stats[key]) stats[key] = { 货号, 规格, 现货: 0, 非现货: 0 };
                if (isNormal) {
                    stats[key].现货 += 数量;
                } else {
                    stats[key].非现货 += 数量;
                }
            });
            
            const list = Object.values(stats).sort((a, b) => a.货号.localeCompare(b.货号));
            const text = list.map(item => {
                const total = item.现货 + item.非现货;
                const qtyStr = item.非现货 > 0 ? `${item.现货}+${item.非现货}=${total}` : `${total}`;
                return `${item.货号}\t${item.规格}\t${qtyStr}`;
            }).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }
        
        function renderOrders() {
            const sortedData = [...orderData].sort((a, b) => {
                const addrA = (a['得物收货地址'] || '').trim();
                const addrB = (b['得物收货地址'] || '').trim();
                const timeA = a['买家支付时间'] || '';
                const timeB = b['买家支付时间'] || '';
                const skuA = `${a['货号'] || ''}|${a['规格'] || ''}`;
                const skuB = `${b['货号'] || ''}|${b['规格'] || ''}`;
                
                if (addrA !== addrB) return addrA.localeCompare(addrB);
                if (config.sortOrder === 'addr-time-sku') {
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return skuA.localeCompare(skuB);
                } else if (config.sortOrder === 'addr-no-sku') {
                    const noA = a['订单号'] || '';
                    const noB = b['订单号'] || '';
                    if (noA !== noB) return noA.localeCompare(noB);
                    return skuA.localeCompare(skuB);
                } else {
                    if (skuA !== skuB) return skuA.localeCompare(skuB);
                    return timeA.localeCompare(timeB);
                }
            });
            
            const groups = {};
            sortedData.forEach(row => {
                const fullAddress = (row['得物收货地址'] || '未知地址').trim();
                const cityMatch = fullAddress.match(/(.+?(?:省|市|自治区|自治州))?(.+?市)/);
                const city = cityMatch ? cityMatch[2] : fullAddress;
                if (!groups[city]) groups[city] = { items: [], fullAddress: fullAddress };
                groups[city].items.push(row);
            });
            
            const groupList = [];
            Object.entries(groups).forEach(([address, data]) => {
                const sortedItems = data.items;
                
                const maxItems = config.maxPerGroup > 0 ? config.maxPerGroup : sortedItems.length;
                const subGroupCount = Math.ceil(sortedItems.length / maxItems);
                
                for (let i = 0; i < subGroupCount; i++) {
                    const subItems = sortedItems.slice(i * maxItems, (i + 1) * maxItems);
                    let mergedItems = subItems;
                    if (config.mergeSku) {
                        const skuMap = {};
                        subItems.forEach(item => {
                            const skuKey = `${item['货号'] || ''}|${item['规格'] || ''}`;
                            if (!skuMap[skuKey]) {
                                skuMap[skuKey] = { ...item, count: 0, orderNo: '', orderCount: 0 };
                            }
                            skuMap[skuKey].count += parseInt(item['数量']) || 1;
                            if (skuMap[skuKey].orderNo) skuMap[skuKey].orderNo += '\n';
                            skuMap[skuKey].orderNo += item['订单号'] || '';
                            skuMap[skuKey].orderCount++;
                        });
                        mergedItems = Object.values(skuMap);
                    }
                    const suffix = subGroupCount > 1 ? `-${i + 1}/${subGroupCount}` : '';
                    const allOrderNos = subItems.map(item => item['订单号'] || '').filter(Boolean).join('\n');
                    groupList.push({
                        address: address + suffix,
                        items: mergedItems,
                        isMerged: config.mergeSku,
                        orderCount: subItems.length,
                        allOrderNos: allOrderNos
                    });
                }
            });
            
            const showNo = config.showNo;
            document.getElementById('ordersContainer').innerHTML = '<div class="orders-grid">' + groupList.map((group, gIdx) => {
                const rows = [];
                const noHeader = showNo ? '<th style="width: 90px; font-size: 10px;">单号</th>' : '';
                group.items.forEach(item => {
                    let orderNo = item['订单号'] || '';
                    if (group.isMerged && item.orderCount > 1) {
                        orderNo += '+';
                    }
                    const qty = group.isMerged ? item.count : (parseInt(item['数量']) || 1);
                    const bgGray = qty > 1 ? (qty % 2 === 0 ? '#ddd' : '#eee') : '';
                    const bgStyle = bgGray ? `background-color: ${bgGray};` : '';
                    const cellStyle = `font-size: 12px; ${bgStyle}`;
                    const noCell = showNo ? `<td style="width: 90px; font-size: 9px; word-break: break-all; white-space: pre-wrap; line-height: 1.1; padding: 1px 4px; ${bgStyle}">${orderNo}</td>` : '';
                    rows.push(`
                        <tr>
                            ${noCell}
                            <td style="${cellStyle}">${item['货号'] || ''}</td>
                            <td style="${cellStyle}">${item['规格'] || ''}</td>
                            <td style="${cellStyle}">${qty > 1 ? qty : ''}</td>
                        </tr>
                    `);
                });
                const noTh = showNo ? '<th style="width: 90px; font-size: 10px;">单号</th>' : '';
                const qtyTh = group.isMerged ? '<th style="font-size: 10px;">数量</th>' : '';
                const headerClass = group.orderCount >= config.maxPerGroup ? 'order-card-header full' : 'order-card-header';
                return `
                    <div class="order-card">
                        <div class="${headerClass}">
                            <span class="address">${group.address}</span>
                            <div class="card-header-right">
                                <input type="text" class="express-input" placeholder="快递单号">
                                <span class="order-count">${group.orderCount}单</span>
                                <button class="icon-btn-small" onclick="copyOrders(this, \`${group.allOrderNos.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)" title="复制订单号">📋</button>
                            </div>
                        </div>
                        <table class="order-table">
                            <thead>
                                <tr>${noTh}<th style="font-size: 10px;">货号</th><th style="font-size: 10px;">规格</th>${qtyTh}</tr>
                            </thead>
                            <tbody>${rows.join('')}</tbody>
                        </table>
                    </div>
                `;
            }).join('') + '</div>';
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            document.getElementById('printHeader').innerHTML = `<span>${dateStr}</span><span>总订单数: ${orderData.length}</span>`;
            document.getElementById('ordersActions').style.display = 'flex';
        }
        
        function changePage(delta) {
            currentPage += delta;
            renderOrders();
            window.scrollTo(0, 0);
        }
        
        function copyOrders(btn, orders) {
            const text = orders.replace(/\\n/g, '\n');
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.textContent;
                btn.textContent = '✅';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = original;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
        
        function exportSummary() {
            const stats = {};
            orderData.forEach(row => {
                const 货号 = row['货号'] || '';
                const 规格 = row['规格'] || '';
                const 数量 = parseInt(row['数量']) || 0;
                const orderType = row['订单类型'] || '';
                const isNormal = orderType === '普通现货';
                const key = `${货号}|${规格}`;
                if (!stats[key]) stats[key] = { 货号, 规格, 现货: 0, 非现货: 0 };
                if (isNormal) {
                    stats[key].现货 += 数量;
                } else {
                    stats[key].非现货 += 数量;
                }
            });
            
            const list = Object.values(stats).sort((a, b) => a.货号.localeCompare(b.货号));
            const exportData = list.map((item, i) => {
                const total = item.现货 + item.非现货;
                const qtyStr = item.非现货 > 0 ? `${item.现货}+${item.非现货}=${total}` : `${total}`;
                return { 序号: i + 1, 货号: item.货号, 规格: item.规格, 总数量: qtyStr };
            });
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '货号规格统计');
            XLSX.writeFile(wb, '货号规格统计.xlsx');
        }
        
        function exportOrders() {
            const sortedData = [...orderData].sort((a, b) => {
                const addrA = (a['得物收货地址'] || '').trim();
                const addrB = (b['得物收货地址'] || '').trim();
                const timeA = a['买家支付时间'] || '';
                const timeB = b['买家支付时间'] || '';
                const skuA = `${a['货号'] || ''}|${a['规格'] || ''}`;
                const skuB = `${b['货号'] || ''}|${b['规格'] || ''}`;
                
                if (addrA !== addrB) return addrA.localeCompare(addrB);
                if (config.sortOrder === 'addr-time-sku') {
                    if (timeA !== timeB) return timeA.localeCompare(timeB);
                    return skuA.localeCompare(skuB);
                } else if (config.sortOrder === 'addr-no-sku') {
                    const noA = a['订单号'] || '';
                    const noB = b['订单号'] || '';
                    if (noA !== noB) return noA.localeCompare(noB);
                    return skuA.localeCompare(skuB);
                } else {
                    if (skuA !== skuB) return skuA.localeCompare(skuB);
                    return timeA.localeCompare(timeB);
                }
            });
            
            const groups = {};
            sortedData.forEach(row => {
                const fullAddress = (row['得物收货地址'] || '未知地址').trim();
                const cityMatch = fullAddress.match(/(.+?(?:省|市|自治区|自治州))?(.+?市)/);
                const city = cityMatch ? cityMatch[2] : fullAddress;
                if (!groups[city]) groups[city] = { items: [] };
                groups[city].items.push(row);
            });
            
            const groupList = [];
            Object.entries(groups).forEach(([address, data]) => {
                const sortedItems = data.items;
                
                const maxItems = config.maxPerGroup > 0 ? config.maxPerGroup : sortedItems.length;
                const subGroupCount = Math.ceil(sortedItems.length / maxItems);
                
                for (let i = 0; i < subGroupCount; i++) {
                    const subItems = sortedItems.slice(i * maxItems, (i + 1) * maxItems);
                    let mergedItems = subItems;
                    if (config.mergeSku) {
                        const skuMap = {};
                        subItems.forEach(item => {
                            const skuKey = `${item['货号'] || ''}|${item['规格'] || ''}`;
                            if (!skuMap[skuKey]) {
                                skuMap[skuKey] = { ...item, count: 0 };
                            }
                            skuMap[skuKey].count += parseInt(item['数量']) || 1;
                        });
                        mergedItems = Object.values(skuMap);
                    }
                    const suffix = subGroupCount > 1 ? `-${i + 1}/${subGroupCount}` : '';
                    groupList.push({ address: address + suffix, items: mergedItems, isMerged: config.mergeSku, orderCount: subItems.length });
                }
            });
            
            const exportData = [];
            const showNo = config.showNo;
            groupList.forEach(group => {
                const noHeader = showNo ? '单号' : '';
                const qtyHeader = group.isMerged ? '数量' : '';
                exportData.push([group.address + ` (${group.orderCount}单)`, '', '', '']);
                exportData.push([noHeader, '货号', '规格', qtyHeader]);
                group.items.forEach(item => {
                    const noVal = showNo ? (item['订单号'] || '') : '';
                    const qtyVal = group.isMerged ? item.count : (item['数量'] || '');
                    exportData.push([noVal, item['货号'] || '', item['规格'] || '', qtyVal]);
                });
            });
            
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            ws['!cols'] = [{ wch: 30 }, { wch: 15 }, { wch: 30 }, { wch: 10 }];
            ws['!rows'] = exportData.map(() => ({ hpt: 18 }));
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '订单列表');
            XLSX.writeFile(wb, '订单列表.xlsx');
        }
    </script>
</body>
</html>
